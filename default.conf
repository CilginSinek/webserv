server {
	listen 3131;
	server_name localhost;

	error_page 404 /404.html;
	error_page 500 502 503 504 /50x.html;
	client_max_body_size 1000000;

	keepalive_timeout 65;

	location / {
		root ./www;
		index index.html;
		methods GET;
	}

	location /old {
		return 301 /new;
	}

	location /new {
		root ./www;
		index new.html;
		methods GET;
	}

	location /upload {
		root ./www;
		upload on;
		methods POST DELETE;
	}

	location /files {
		root ./www;
		autoindex on;
		methods GET;
	}

	location /cgi {
		root ./cgi-bin;
		cgi .py /usr/bin/python3;
	}
}
