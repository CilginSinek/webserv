server {
    listen 3131;
    server_name localhost;
    client_max_body_size 200000000;

    error_page 404 ./www/404.html;

    location / {
        root ./www;
        index index.html;
        methods GET;
    }

    location /post_body {
        client_max_body_size 100;
        root ./www;
        methods POST;
    }

    location /directory/ {
        root ./YoupiBanane;
        methods GET;
        index youpi.bad_extension;
        autoindex on;
    }

    location .bla
    {
        methods POST;
        cgi .bla ./cgi_tester;
    }
}